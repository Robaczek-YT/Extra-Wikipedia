<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/wikipedia.png">
    <title>Formularz Kontaktowy</title>
    <style>
        /* Stylizacja tła i czcionki */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Kontener formularza */
        .contact-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        /* Stylizacja pól wejściowych */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        /* Przyciski */
        button, .back-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Stylizacja przycisku Wróć */
        .back-button {
            background-color: #666;
            color: white;
        }

        .back-button:hover {
            background-color: #555;
        }

        button:active, .back-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="contact-container">
    <h2>Kontakt</h2>
    <form action="https://formspree.io/f/xkoyzlqa" method="POST">
        <div class="form-group">
            <label for="name">Twoje imię:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Twój e-mail:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="message">Wiadomość:</label>
            <textarea id="message" name="message" required></textarea>
        </div>

        <button type="submit">Wyślij wiadomość</button>
    </form>
    
    <!-- Przycisk powrotu -->
    <a href="../index.html" class="back-button">Wróć</a>
</div>

</body>
</html>
